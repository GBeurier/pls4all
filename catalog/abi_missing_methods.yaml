# Catalog methods that libn4m EXPORTS but the M2 auto-discovery missed.
# Codex (thread 019e6a1c) ruled: add all of these as public catalog methods —
# this makes the catalog honest about API already shipped + used by
# bindings/benchmarks, it is NOT new API. reconcile_abi.py --add-missing appends
# a full schema entry for each (abi_symbols from the prefix, tu grepped from the
# c_api source, headers=n4m.h, since_abi mirrored from siblings).
# Fields: prefix (ABI symbol prefix), category, subcategory, name (-> method_id).
new_methods:
