# Reviewed catalog method_id -> ABI symbol prefix mapping (source of truth for
# catalog/scripts/reconcile_abi.py). A symbol is assigned to the method whose
# prefix is the LONGEST match (so n4m_split_spxy_fold_* -> spxy_fold, not spxy).
# null = the catalog entry is a helper/aggregate/config-side stub with NO public
# method symbol. Hand-curated against cpp/abi/expected_symbols_linux.txt.
#
# NOTE (Phase-B WIP): `reconcile_abi.py --check` reports residual ORPHAN symbols
# (exported operators with no catalog method yet — e.g. the calibration-transfer
# aligners and several preprocessing variants) and any empty mapped methods.
# Those are catalog *additions* tracked separately; --strict-abi is enabled in
# CI only once the residual is zero.
