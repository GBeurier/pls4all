name: Parity gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  parity-gate:
    runs-on: ubuntu-22.04
    env:
      OPENBLAS_CORETYPE: HASWELL
      OPENBLAS_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      PYTHONHASHSEED: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pinned generator deps (via requirements-lock.txt)
        working-directory: parity/python_generator
        run: |
          python -m pip install --upgrade pip
          # G2: install via the lock file so transitive deps are pinned too.
          # `pip install -e .` is layered on top to make the generator
          # `c4a_parity_*_ref` modules importable.
          pip install -r requirements-lock.txt
          pip install -e .

      - name: Install Linux toolchain (gcc-12 + ninja)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-12 g++-12 ninja-build cmake

      - name: Configure (ci-linux-gcc12-release)
        run: cmake --preset ci-linux-gcc12-release

      - name: Build libc4a + CLI + tests
        run: cmake --build --preset ci-linux-gcc12-release --parallel

      - name: Run unified parity gate (Stage 1 + 2 + 3)
        # Stage 1: fixture determinism (regenerate from pinned generator)
        # Stage 2: reference parity — libc4a vs canonical upstream
        #          (numpy / scipy / sklearn / pywt / pybaselines / nirs4all)
        #          via parity/run_reference_parity.py, comparator
        #          parity/reference_parity.py
        # Stage 3: C++ parity tests vs the frozen Python fixtures
        run: python parity/python_generator/scripts/run_parity_gate.py \
               --build-dir build/ci-linux-gcc12-release

      - name: Run binding-parity (Stage 4, Python)
        # Stage 4: per-binding bit-exact check vs libc4a.
        # The comparator (parity/binding_parity.py) is in place; the
        # actual smoke runner ships with each language binding (e.g.
        # bindings/python/tests/test_binding_parity.py for Phase 22).
        # This step is a no-op until the Python binding ships.
        if: hashFiles('bindings/python/**/*.py') != ''
        run: |
          python -m bindings.python.tests.test_binding_parity

      - name: Set up R toolchain (Phase 23)
        # R toolchain only needed when the R binding source tree exists.
        if: hashFiles('bindings/r/chemometrics4all/R/*.R') != ''
        run: |
          sudo apt-get install -y --no-install-recommends r-base r-base-dev

      - name: Install R binding-parity deps (jsonlite + testthat)
        if: hashFiles('bindings/r/chemometrics4all/R/*.R') != ''
        run: |
          # CRAN-only dependencies of the R binding.
          R --no-save --no-restore -e \
            'install.packages(c("jsonlite", "testthat"), repos = "http://cran.r-project.org")'

      - name: Run binding-parity (Stage 4, R)
        if: hashFiles('bindings/r/chemometrics4all/R/*.R') != ''
        env:
          CHEMOMETRICS4ALL_LIB_PATH: ${{ github.workspace }}/build/ci-linux-gcc12-release/cpp/src/libc4a.so.1.9.0
          CHEMOMETRICS4ALL_FIXTURE_DIR: ${{ github.workspace }}/parity/fixtures
        run: |
          R CMD INSTALL --install-tests bindings/r/chemometrics4all
          cd "$(R RHOME)/library/chemometrics4all/tests"
          Rscript testthat.R

      - name: CLI selfcheck
        run: ./build/ci-linux-gcc12-release/cpp/cli/chemometrics4all_cli --selfcheck
