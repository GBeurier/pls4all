name: Parity gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  fixture-determinism:
    runs-on: ubuntu-22.04
    env:
      OPENBLAS_CORETYPE: HASWELL
      OPENBLAS_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      PYTHONHASHSEED: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pinned generator deps
        working-directory: parity/python_generator
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt
          pip install -e . --no-deps

      - name: Verify fixtures are bit-identical to checked-in copies
        working-directory: parity/python_generator
        run: generate-fixtures --check --out ../fixtures

      - name: Build libp4a (Linux gcc-12 Release)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-12 g++-12 ninja-build cmake
          cmake --preset ci-linux-gcc12-release
          cmake --build --preset ci-linux-gcc12-release --parallel

      - name: Run C++ numerical parity tests
        run: ctest --preset ci-linux-gcc12-release --output-on-failure

      - name: Run pls4all Python binding smoke test
        env:
          PLS4ALL_LIB_PATH: ${{ github.workspace }}/build/ci-linux-gcc12-release/cpp/src/libp4a.so
        run: |
          pip install -e bindings/python
          python - <<'PY'
          import pls4all

          assert pls4all.version().startswith("0.97.1")
          with pls4all.Context() as ctx, pls4all.Config() as cfg:
              cfg.n_components = 3
              cfg.algorithm = pls4all.Algorithm.PCR
              cfg.solver = pls4all.Solver.SVD
              cfg.deflation = pls4all.Deflation.REGRESSION
              assert cfg.n_components == 3
              assert cfg.algorithm == pls4all.Algorithm.PCR
              assert cfg.solver == pls4all.Solver.SVD
              assert cfg.deflation == pls4all.Deflation.REGRESSION
              cfg.algorithm = pls4all.Algorithm.PLS_CANONICAL
              cfg.solver = pls4all.Solver.NIPALS
              cfg.deflation = pls4all.Deflation.CANONICAL
              assert cfg.algorithm == pls4all.Algorithm.PLS_CANONICAL
              assert cfg.deflation == pls4all.Deflation.CANONICAL
              cfg.algorithm = pls4all.Algorithm.PLS_SVD
              cfg.solver = pls4all.Solver.SVD
              cfg.deflation = pls4all.Deflation.CANONICAL
              assert cfg.algorithm == pls4all.Algorithm.PLS_SVD
              assert cfg.solver == pls4all.Solver.SVD
              assert cfg.deflation == pls4all.Deflation.CANONICAL
              cfg.algorithm = pls4all.Algorithm.PLS_DA
              cfg.deflation = pls4all.Deflation.REGRESSION
              assert cfg.algorithm == pls4all.Algorithm.PLS_DA
              cfg.algorithm = pls4all.Algorithm.OPLS
              cfg.solver = pls4all.Solver.NIPALS
              cfg.deflation = pls4all.Deflation.ORTHOGONAL
              assert cfg.algorithm == pls4all.Algorithm.OPLS
              assert cfg.deflation == pls4all.Deflation.ORTHOGONAL
              cfg.algorithm = pls4all.Algorithm.OPLS_DA
              cfg.deflation = pls4all.Deflation.ORTHOGONAL
              assert cfg.algorithm == pls4all.Algorithm.OPLS_DA
              cfg.algorithm = pls4all.Algorithm.PLS_REGRESSION
              cfg.deflation = pls4all.Deflation.REGRESSION
              cfg.solver = pls4all.Solver.ORTHOGONAL_SCORES
              assert cfg.solver == pls4all.Solver.ORTHOGONAL_SCORES
              cfg.solver = pls4all.Solver.POWER
              assert cfg.solver == pls4all.Solver.POWER
              cfg.solver = pls4all.Solver.RANDOMIZED_SVD
              assert cfg.solver == pls4all.Solver.RANDOMIZED_SVD
              try:
                  ctx.backend = pls4all.Backend.CUDA
                  raise AssertionError("expected BACKEND_UNAVAILABLE")
              except pls4all.Pls4allError as e:
                  assert e.status_name == "backend unavailable"
          print("python binding smoke OK from CI")
          PY

      - name: Verify parity-reference lockfile matches the registry
        # Structural gate over benchmarks/parity_timing/registry.py. The
        # lockfile records which methods declare a python / r / extra
        # reference and is consumed by the per-method dashboards under
        # docs/methods/ (📐 icon). Drift here means the documented truth
        # sources no longer agree with the registry — fail before merge
        # so the regenerated docs stay honest.
        run: |
          python -m benchmarks.parity_timing.lockfile --check

      - name: Confirm core parity gate
        run: |
          echo "Core parity gate validates: (1) fixture determinism — every JSON in parity/fixtures/ regenerates bit-identically from the pinned sklearn/numpy generator under parity/python_generator/; (2) the C++ ctest suite asserts pls4all matches those fixtures within parity/tolerances.md per-row tolerances (preprocessing, validation metrics, NIPALS, PLSCanonical, PLSSVD, PLS-DA, PLS-LDA, PLS-logistic, MB-PLS, LW-PLS, OPLS, multi-class OPLS-DA, orthogonal-scores, SIMPLS, kernel, wide-kernel, SVD, power, randomized-SVD, PCR and variable-selection through WVC-PLS); (3) the structural parity-reference lockfile (truth_sources.lock.json) matches the live registry, so the 📐 markers in docs/methods/ never silently drift. The live cross-binding parity_timing/runner.py is a developer smoke check, not a CI gate — it needs R/Octave and is run manually."
