# Build and publish the @pls4all/wasm package.
#
# Trusted publishing config (one-time, maintainer action)
# -------------------------------------------------------
# npm side:
#   Package name      = @pls4all/wasm
#   Owner/repository  = GBeurier/pls4all
#   Workflow filename = release-js.yml
#   Environment       = npm
#
# JSR side:
#   Scope/package     = @pls4all/wasm
#   GitHub repository = GBeurier/pls4all
#   Workflow filename = release-js.yml
#   Environment       = jsr

name: release-js

on:
  push:
    tags:
      - "v*.*.*"
  pull_request:
    paths:
      - "bindings/js/**"
      - "cpp/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "cmake/**"
      - ".github/workflows/release-js.yml"
  workflow_dispatch:
    inputs:
      publish_to:
        description: "Optional manual publish target."
        required: true
        default: "none"
        type: choice
        options: [none, npm, jsr, both]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: build wasm package
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: npm
          cache-dependency-path: bindings/js/package-lock.json

      - name: Ensure npm trusted-publishing capable CLI
        run: npm install -g npm@^11.5.1

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake ninja-build

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: "3.1.74"

      - name: Install JS dependencies
        working-directory: bindings/js
        run: npm ci --ignore-scripts

      - name: Build Emscripten WASM
        working-directory: bindings/js
        run: npm run build:wasm

      - name: Build TypeScript package
        working-directory: bindings/js
        run: npm run build

      - name: Run WASM parity smoke
        working-directory: bindings/js
        run: npm test

      - name: Enforce full JS method binding surface
        working-directory: bindings/js
        run: npm run test:methods:strict

      - name: Check tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          pkg_version="$(node -p "require('./bindings/js/package.json').version")"
          test "v${pkg_version}" = "${GITHUB_REF_NAME}"

      - name: Pack npm tarball
        working-directory: bindings/js
        run: |
          set -euo pipefail
          mkdir -p ../../dist-js
          npm pack --ignore-scripts --pack-destination ../../dist-js

      - name: Smoke installed package tarball
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          cd "${tmp}"
          npm init -y >/dev/null
          npm install "${GITHUB_WORKSPACE}"/dist-js/pls4all-wasm-*.tgz
          node --input-type=module <<'JS'
          import { loadModule, version, PLSRegression } from "@pls4all/wasm";
          await loadModule();
          const X = [[1, 2], [3, 4], [5, 6], [7, 8]];
          const y = [1, 2, 3, 4];
          const model = new PLSRegression({ nComponents: 1 }).fit(X, y);
          const pred = model.predict(X);
          if (!(pred instanceof Float64Array) || pred.length !== y.length) {
              throw new Error("unexpected prediction shape");
          }
          console.log(`installed package OK: ${version()}`);
          JS

      - uses: actions/upload-artifact@v4
        with:
          name: pls4all-wasm-tarball
          path: dist-js/pls4all-wasm-*.tgz
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: pls4all-wasm-dist
          path: bindings/js/dist
          if-no-files-found: error

  publish-npm:
    name: publish to npm
    needs: build
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.publish_to == 'npm' || inputs.publish_to == 'both'))
    runs-on: ubuntu-22.04
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm trusted-publishing capable CLI
        run: npm install -g npm@^11.5.1

      - uses: actions/download-artifact@v4
        with:
          name: pls4all-wasm-tarball
          path: dist-js

      - name: Publish package
        run: npm publish dist-js/pls4all-wasm-*.tgz --access public

  publish-jsr:
    name: publish to JSR
    needs: build
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.publish_to == 'jsr' || inputs.publish_to == 'both'))
    runs-on: ubuntu-22.04
    environment: jsr
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"

      - uses: actions/download-artifact@v4
        with:
          name: pls4all-wasm-dist
          path: bindings/js/dist

      - name: Publish package
        working-directory: bindings/js
        run: npx jsr publish --allow-dirty --allow-slow-types

  attach-release-asset:
    name: attach npm tarball to GitHub Release
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pls4all-wasm-tarball
          path: dist-js

      - name: Upload to the matching Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-js/pls4all-wasm-*.tgz
          fail_on_unmatched_files: true
