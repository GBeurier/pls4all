# M15 scaffold — cibuildwheel matrix for the two Python packages.
#
# Builds `nirs4all-methods` (full) and `pls4all` (slim) wheels across:
#   - Linux x86_64 (manylinux 2_28) — gcc 13
#   - Linux aarch64 (manylinux 2_28) — gcc 13, qemu cross
#   - macOS x86_64 (macos-13)
#   - macOS arm64 (macos-14)
#   - Windows x86_64 (windows-2022, MSVC 2022)
#
# Wheel post-processing:
#   - Linux:    auditwheel repair → tag manylinux_2_28
#   - macOS:    delocate-wheel    → bundle libn4m.dylib
#   - Windows:  delvewheel repair → bundle libn4m.dll
#
# Status: scaffold — pipeline declared, NOT activated. Activation happens
# after M5+M6 (ABI rename) + M9+M10 (Python packages) land their build
# glue. The current pls4all main has its own release pipeline at PRs
# #1/#2/#3 (release/m0-baseline → m1-pypi → m2-cran) which M15 absorbs.
#
# Required secrets (set up in M15 focused session, before any v1.0.0 tag):
#   PYPI_TOKEN_NIRS4ALL_METHODS    — Trusted Publishing for nirs4all-methods
#   PYPI_TOKEN_PLS4ALL             — Trusted Publishing for pls4all (slim)

name: release-wheels

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag (e.g. v1.0.0-rc1)'
        required: true
        type: string
      publish:
        description: 'Publish to PyPI (else artifacts only)'
        required: true
        type: boolean
        default: false
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+'

# ACTIVE: the per-package build machinery is in place — prepare_wheel_packages.sh
# builds libn4m, generates the two self-contained package dirs
# (make_python_package.py: nirs4all-methods=full n4m, pls4all=slim), and stages
# libn4m into each. Verified locally on Linux (both wheels build/install/import);
# macOS/Windows/aarch64 build on this matrix. Publish is input-gated below and
# uses PyPI Trusted Publishing (one-time maintainer setup of the publisher).
jobs:
  matrix:
    name: ${{ matrix.package }} / ${{ matrix.os }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        package:
          - nirs4all-methods
          - pls4all
        os:
          - ubuntu-22.04
          - macos-13
          - macos-14
          - windows-2022
        arch:
          - x86_64
          - aarch64
        exclude:
          - os: macos-13
            arch: aarch64
          - os: macos-14
            arch: x86_64
          - os: windows-2022
            arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (Linux aarch64)
        if: runner.os == 'Linux' && matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_PACKAGE_DIR: bindings/python_${{ matrix.package == 'pls4all' && 'pls4all' || 'nirs4all_methods' }}
          CIBW_ARCHS_LINUX:   ${{ matrix.arch }}
          CIBW_ARCHS_MACOS:   ${{ matrix.arch }}
          CIBW_ARCHS_WINDOWS: AMD64
          CIBW_BUILD: cp310-* cp311-* cp312-* cp313-*
          CIBW_SKIP: "*-musllinux_*"
          # Once per platform (in the build container): build libn4m, generate the
          # two self-contained package dirs (make_python_package.py), and stage
          # libn4m into each module's lib/. Verified locally on Linux: both wheels
          # build, install, and import (nirs4all-methods ships n4m + libn4m;
          # pls4all ships the slim PLS module only).
          CIBW_BEFORE_ALL_LINUX:   bash bindings/python/scripts/prepare_wheel_packages.sh
          CIBW_BEFORE_ALL_MACOS:   bash bindings/python/scripts/prepare_wheel_packages.sh
          CIBW_BEFORE_ALL_WINDOWS: bash bindings/python/scripts/prepare_wheel_packages.sh
          CIBW_BEFORE_BUILD: python -m pip install setuptools wheel
          CIBW_TEST_REQUIRES: pytest numpy
          CIBW_TEST_COMMAND: pytest {project}/bindings/python_${{ matrix.package == 'pls4all' && 'pls4all' || 'nirs4all_methods' }}/tests

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.package }}-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: matrix
    # Input-gated: only on an explicit workflow_dispatch with publish=true. Uses
    # PyPI Trusted Publishing (id-token below) — requires the one-time publisher
    # setup for nirs4all-methods + pls4all on PyPI.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/nirs4all-methods
    permissions:
      id-token: write   # Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # PyPI uses Trusted Publishing — no token needed if id-token: write
          # is granted at the job level (above).
