# Build + publish the `nirs4all-methods` Python wheel (full n4m surface).
#
# Scope split with release-python.yml (which owns the slim `pls4all` wheel):
#   - `pls4all`         → release-python.yml (mature: retag, sklearn smoke,
#                         post-publish reinstall test).
#   - `nirs4all-methods`→ release-wheels.yml (THIS file). One workflow per
#                         PyPI project keeps Trusted Publishing one-to-one
#                         and prevents the dual-publish collision the two
#                         workflows had previously on the `pls4all` name.
#
# Builds `nirs4all-methods` across:
#   - Linux x86_64 (manylinux 2_28) — gcc 13
#   - Linux aarch64 (manylinux 2_28) — gcc 13, qemu cross
#   - macOS x86_64 (macos-13)
#   - macOS arm64 (macos-14)
#   - Windows x86_64 (windows-2022, MSVC 2022)
#
# Wheel post-processing:
#   - Linux:    auditwheel repair → tag manylinux_2_28
#   - macOS:    delocate-wheel    → bundle libn4m.dylib
#   - Windows:  delvewheel repair --analyze-existing → bundle libn4m.dll
#     (libn4m is loaded via ctypes, not linked, so delvewheel needs the
#      --analyze-existing flag to discover + vendor the DLL.)
#
# Status: ACTIVE. Builds run on tag pushes (v*.*.*) and workflow_dispatch; the
# publish job is gated on (a) tag push without `-rc`, or (b) workflow_dispatch
# with publish=true. Uses PyPI Trusted Publishing (no API tokens) — one-time
# maintainer setup on PyPI for `nirs4all-methods`: owner/repo,
# workflow file `release-wheels.yml`, environment `pypi`.

name: release-wheels

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag (e.g. v1.0.0-rc1)'
        required: true
        type: string
      publish:
        description: 'Publish to PyPI (else artifacts only)'
        required: true
        type: boolean
        default: false
  push:
    # GitHub tag filters are globs, not regex — '+' is literal there, so
    # 'v[0-9]+.[0-9]+.[0-9]+' never matches v0.98.0. Use '*' wildcards.
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

# ACTIVE: the per-package build machinery is in place — prepare_wheel_packages.sh
# builds libn4m, generates the self-contained nirs4all-methods package dir
# (make_python_package.py --name nirs4all-methods, ships the full `n4m`
# module), and stages libn4m into it. Verified locally on Linux (wheel
# builds/installs/imports); macOS/Windows/aarch64 build on this matrix.
# Publish is gated on tag-push (non `-rc`) OR workflow_dispatch + publish=true,
# and uses PyPI Trusted Publishing (one-time maintainer setup of the publisher).
jobs:
  matrix:
    name: nirs4all-methods / ${{ matrix.os }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - macos-13
          - macos-14
          - windows-2022
        arch:
          - x86_64
          - aarch64
        exclude:
          - os: macos-13
            arch: aarch64
          - os: macos-14
            arch: x86_64
          - os: windows-2022
            arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up QEMU (Linux aarch64)
        if: runner.os == 'Linux' && matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3

      # The nirs4all-methods package dir is generated + gitignored, so it must
      # exist before cibuildwheel reads `package-dir`/pyproject.toml.
      # Materialize it here METADATA-ONLY — make_python_package.py excludes
      # lib/ (staged at build time), so this needs no compiler/toolchain on
      # any OS. libn4m is built + staged inside each build env by
      # CIBW_BEFORE_ALL (in the manylinux container on Linux) so the bundled
      # lib matches the wheel.
      - name: Materialize the nirs4all-methods package dir (metadata only)
        run: python bindings/python/scripts/make_python_package.py --name nirs4all-methods

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        with:
          package-dir: bindings/python_nirs4all_methods
        env:
          CIBW_ARCHS_LINUX:   ${{ matrix.arch }}
          CIBW_ARCHS_MACOS:   ${{ matrix.arch }}
          CIBW_ARCHS_WINDOWS: AMD64
          CIBW_BUILD: cp310-* cp311-* cp312-* cp313-*
          CIBW_SKIP: "*-musllinux_*"
          # cibuildwheel 2.21.3 pins its build deps; `latest` lets the generated
          # pyprojects' packaging>=24.2 requirement resolve.
          CIBW_DEPENDENCY_VERSIONS: latest
          CIBW_MANYLINUX_X86_64_IMAGE:  manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
          # Windows builds libn4m with the MSVC preset (Visual Studio generator,
          # finds the toolchain itself); Linux/macOS use the default dev-release.
          # This propagates to CIBW_BEFORE_ALL on the host-built platforms;
          # the Linux container uses build_libn4m_in_wheel.sh's dev-release default.
          PLS4ALL_BUILD_PRESET: ${{ runner.os == 'Windows' && 'ci-windows-msvc-release' || 'dev-release' }}
          # Rebuild + re-stage libn4m inside each build environment so the bundled
          # lib matches the wheel (in-container glibc on Linux).
          CIBW_BEFORE_ALL_LINUX:   bash bindings/python/scripts/prepare_wheel_packages.sh
          CIBW_BEFORE_ALL_MACOS:   bash bindings/python/scripts/prepare_wheel_packages.sh
          CIBW_BEFORE_ALL_WINDOWS: bash bindings/python/scripts/prepare_wheel_packages.sh
          CIBW_BEFORE_BUILD: python -m pip install setuptools wheel
          # delvewheel is not bundled by cibuildwheel; install it for the Windows
          # repair (this override replaces the generic CIBW_BEFORE_BUILD on Windows).
          CIBW_BEFORE_BUILD_WINDOWS: python -m pip install setuptools wheel delvewheel
          # libn4m is loaded via ctypes (not linked by any extension), so the
          # Windows repair needs --analyze-existing to discover + vendor the DLL.
          # Linux auditwheel / macOS delocate already pick up the bundled lib.
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: "delvewheel repair --analyze-existing -w {dest_dir} -v {wheel}"
          CIBW_TEST_REQUIRES: pytest numpy
          CIBW_TEST_COMMAND: pytest {project}/bindings/python_nirs4all_methods/tests

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-nirs4all-methods-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl

  publish:
    name: Publish nirs4all-methods to PyPI
    needs: matrix
    # Gated on either:
    #   (a) tag push v*.*.* without `-rc` (production release), or
    #   (b) workflow_dispatch + publish=true (manual dispatch).
    # Trusted Publishing requires the one-time publisher setup for
    # nirs4all-methods on PyPI: owner/repo, workflow file `release-wheels.yml`,
    # environment `pypi`.
    if: |
      (github.event_name == 'push'
       && startsWith(github.ref, 'refs/tags/v')
       && !contains(github.ref_name, '-'))
      || (github.event_name == 'workflow_dispatch'
          && github.event.inputs.publish == 'true')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/nirs4all-methods
    permissions:
      id-token: write   # Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-nirs4all-methods-*
          merge-multiple: true
          path: dist

      - name: Validate tag matches the wheel version (tag push only)
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          ref_name="${GITHUB_REF_NAME}"
          if [[ ! "${ref_name}" =~ ^v[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "::error::Tag ${ref_name} is not a SemVer release (v<MAJOR>.<MINOR>.<PATCH>)" >&2
            exit 1
          fi
          tag_version="${ref_name#v}"
          wheel_version=$(ls dist/nirs4all_methods-*.whl | head -n1 \
                          | sed -E 's|.*/nirs4all_methods-([0-9]+\.[0-9]+\.[0-9]+)-.*|\1|')
          if [[ "${tag_version}" != "${wheel_version}" ]]; then
            echo "::error::Tag version (${tag_version}) != wheel version (${wheel_version})" >&2
            exit 1
          fi
          echo "tag ${ref_name} matches wheel version ${wheel_version}."

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # PyPI uses Trusted Publishing — no token needed if id-token: write
          # is granted at the job level (above).
