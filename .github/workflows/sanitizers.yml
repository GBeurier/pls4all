name: Sanitizers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  asan-ubsan-tsan:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        san: [asan, ubsan, tsan, asan_ubsan]
    steps:
      - uses: actions/checkout@v4
      - name: Install LLVM apt repository
        run: |
          curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/llvm.gpg
          codename=$(lsb_release -sc)
          echo "deb [signed-by=/etc/apt/keyrings/llvm.gpg] http://apt.llvm.org/$codename/ llvm-toolchain-$codename-16 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-16.list
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-16 ninja-build cmake
      - run: cmake --preset ci-${{ matrix.san }}
      - run: cmake --build --preset ci-${{ matrix.san }} --parallel
      - run: ctest --preset ci-${{ matrix.san }} --output-on-failure
      - name: Run CLI selfcheck under sanitizers
        run: ./build/ci-${{ matrix.san }}/cpp/cli/pls4all_cli --selfcheck
