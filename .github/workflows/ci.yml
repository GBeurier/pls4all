name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpp:
    name: cpp / ${{ matrix.cfg.label }}
    runs-on: ${{ matrix.cfg.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        cfg:
          - { label: linux-gcc12-release,   runs_on: ubuntu-22.04, preset: ci-linux-gcc12-release,   apt_install: "gcc-12 g++-12 ninja-build" }
          - { label: linux-gcc12-debug,     runs_on: ubuntu-22.04, preset: ci-linux-gcc12-debug,     apt_install: "gcc-12 g++-12 ninja-build" }
          - { label: linux-gcc13-release,   runs_on: ubuntu-24.04, preset: ci-linux-gcc13-release,   apt_install: "gcc-13 g++-13 ninja-build" }
          - { label: linux-clang16-release, runs_on: ubuntu-22.04, preset: ci-linux-clang16-release, apt_install: "clang-16 ninja-build" }
          - { label: linux-clang16-debug,   runs_on: ubuntu-22.04, preset: ci-linux-clang16-debug,   apt_install: "clang-16 ninja-build" }
          - { label: macos-clang-release,   runs_on: macos-14,     preset: ci-macos-clang-release,   apt_install: "" }
          - { label: macos-clang-debug,     runs_on: macos-14,     preset: ci-macos-clang-debug,     apt_install: "" }
          - { label: macos-universal2,      runs_on: macos-14,     preset: ci-macos-universal2,      apt_install: "" }
          - { label: windows-msvc-release,  runs_on: windows-2022, preset: ci-windows-msvc-release,  apt_install: "" }
          - { label: windows-msvc-debug,    runs_on: windows-2022, preset: ci-windows-msvc-debug,    apt_install: "" }
          - { label: windows-mingw-release, runs_on: windows-2022, preset: ci-windows-mingw-release, apt_install: "" }
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM apt repository (Linux clang)
        if: runner.os == 'Linux' && contains(matrix.cfg.label, 'clang')
        run: |
          curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/llvm.gpg
          codename=$(lsb_release -sc)
          echo "deb [signed-by=/etc/apt/keyrings/llvm.gpg] http://apt.llvm.org/$codename/ llvm-toolchain-$codename-16 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-16.list

      - name: Install Linux toolchain
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ${{ matrix.cfg.apt_install }} cmake

      - name: Install macOS toolchain
        if: runner.os == 'macOS'
        run: brew install ninja cmake

      - name: Install Windows MSVC toolchain
        if: runner.os == 'Windows' && contains(matrix.cfg.label, 'msvc')
        uses: microsoft/setup-msbuild@v2

      - name: Install Windows MinGW toolchain
        if: runner.os == 'Windows' && contains(matrix.cfg.label, 'mingw')
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-toolchain mingw-w64-ucrt-x86_64-cmake mingw-w64-ucrt-x86_64-ninja
          path-type: inherit

      - name: Configure (Unix / MSVC)
        if: '!contains(matrix.cfg.label, ''mingw'')'
        run: cmake --preset ${{ matrix.cfg.preset }}

      - name: Configure (MinGW)
        if: contains(matrix.cfg.label, 'mingw')
        shell: msys2 {0}
        run: cmake --preset ${{ matrix.cfg.preset }} -G Ninja

      - name: Build (Unix / MSVC)
        if: '!contains(matrix.cfg.label, ''mingw'')'
        run: cmake --build --preset ${{ matrix.cfg.preset }} --parallel

      - name: Build (MinGW)
        if: contains(matrix.cfg.label, 'mingw')
        shell: msys2 {0}
        run: cmake --build --preset ${{ matrix.cfg.preset }} --parallel

      - name: Test (Unix / MSVC)
        if: '!contains(matrix.cfg.label, ''mingw'')'
        run: ctest --preset ${{ matrix.cfg.preset }} --output-on-failure

      - name: Test (MinGW)
        if: contains(matrix.cfg.label, 'mingw')
        shell: msys2 {0}
        run: ctest --preset ${{ matrix.cfg.preset }} --output-on-failure

      - name: Run CLI selfcheck (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./build/${{ matrix.cfg.preset }}/cpp/cli/n4m_cli --selfcheck

      - name: Upload Release artefacts
        if: contains(matrix.cfg.label, 'release')
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: libn4m-${{ matrix.cfg.label }}
          path: |
            build/${{ matrix.cfg.preset }}/cpp/src/**/p4a*
            build/${{ matrix.cfg.preset }}/cpp/src/**/libn4m*
            build/${{ matrix.cfg.preset }}/cpp/cli/n4m_cli*
          if-no-files-found: warn

  fitpack:
    name: fitpack / linux-gcc-release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain (incl. gfortran)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc g++ gfortran ninja-build cmake python3-venv

      - name: Configure (Release, FITPACK on via system gfortran)
        run: |
          cmake -S . -B build/fitpack -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build/fitpack --parallel

      - name: CLI selfcheck reports fitpack=1
        run: |
          info=$(./build/fitpack/cpp/cli/n4m_cli --abi-info)
          echo "$info"
          echo "$info" | grep -qE 'build_info *: *fitpack=1' \
            || { echo 'ERROR: FITPACK not enabled'; exit 1; }
          ./build/fitpack/cpp/cli/n4m_cli --selfcheck

      # Hard parity gate: the gated spline_smooth replay (assert_close, 1e-12)
      # runs here under fitpack=1. Tolerant comparison, robust across gfortran
      # versions (FITPACK is pure double arithmetic, no BLAS).
      - name: Test (gated spline_smooth replay runs under fitpack=1)
        run: ctest --test-dir build/fitpack --output-on-failure

      # Informational drift detector: regen --check is an EXACT float-bit
      # comparison against the committed oracle. The committed oracle is
      # toolchain-specific (whatever gfortran first generated it), so a 1-ULP
      # difference from this runner's gfortran would flag here without meaning
      # the engine is wrong — the tolerant ctest above is the real gate. Run it
      # non-blocking so cross-compiler bit-drift is visible but not flaky-red.
      - name: Detect spline_smooth oracle bit-drift (informational)
        continue-on-error: true
        run: |
          python3 -m venv /tmp/fitpack-venv
          /tmp/fitpack-venv/bin/pip install --quiet numpy
          N4M_LIB_PATH="$PWD/$(ls build/fitpack/cpp/src/libn4m.so.*.*.* | head -1)" \
          PYTHONPATH=bindings/python/src \
            /tmp/fitpack-venv/bin/python parity/scripts/regen_aug_fixtures.py --check
