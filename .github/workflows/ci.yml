name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpp:
    name: cpp / ${{ matrix.cfg.label }}
    runs-on: ${{ matrix.cfg.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        cfg:
          - { label: linux-gcc12-release,   runs_on: ubuntu-22.04, preset: ci-linux-gcc12-release,   apt_install: "gcc-12 g++-12 ninja-build" }
          - { label: linux-gcc12-debug,     runs_on: ubuntu-22.04, preset: ci-linux-gcc12-debug,     apt_install: "gcc-12 g++-12 ninja-build" }
          - { label: linux-gcc13-release,   runs_on: ubuntu-24.04, preset: ci-linux-gcc13-release,   apt_install: "gcc-13 g++-13 ninja-build" }
          - { label: linux-clang16-release, runs_on: ubuntu-22.04, preset: ci-linux-clang16-release, apt_install: "clang-16 ninja-build" }
          - { label: linux-clang16-debug,   runs_on: ubuntu-22.04, preset: ci-linux-clang16-debug,   apt_install: "clang-16 ninja-build" }
          - { label: macos-clang-release,   runs_on: macos-14,     preset: ci-macos-clang-release,   apt_install: "" }
          - { label: macos-clang-debug,     runs_on: macos-14,     preset: ci-macos-clang-debug,     apt_install: "" }
          - { label: macos-universal2,      runs_on: macos-14,     preset: ci-macos-universal2,      apt_install: "" }
          - { label: windows-msvc-release,  runs_on: windows-2022, preset: ci-windows-msvc-release,  apt_install: "" }
          - { label: windows-msvc-debug,    runs_on: windows-2022, preset: ci-windows-msvc-debug,    apt_install: "" }
          - { label: windows-mingw-release, runs_on: windows-2022, preset: ci-windows-mingw-release, apt_install: "" }
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM apt repository (Linux clang)
        if: runner.os == 'Linux' && contains(matrix.cfg.label, 'clang')
        run: |
          curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/llvm.gpg
          codename=$(lsb_release -sc)
          echo "deb [signed-by=/etc/apt/keyrings/llvm.gpg] http://apt.llvm.org/$codename/ llvm-toolchain-$codename-16 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-16.list

      - name: Install Linux toolchain
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ${{ matrix.cfg.apt_install }} cmake

      - name: Install macOS toolchain
        if: runner.os == 'macOS'
        run: brew install ninja cmake

      - name: Install Windows MSVC toolchain
        if: runner.os == 'Windows' && contains(matrix.cfg.label, 'msvc')
        uses: microsoft/setup-msbuild@v2

      - name: Install Windows MinGW toolchain
        if: runner.os == 'Windows' && contains(matrix.cfg.label, 'mingw')
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-toolchain mingw-w64-ucrt-x86_64-cmake mingw-w64-ucrt-x86_64-ninja
          path-type: inherit

      - name: Configure (Unix / MSVC)
        if: '!contains(matrix.cfg.label, ''mingw'')'
        run: cmake --preset ${{ matrix.cfg.preset }}

      - name: Configure (MinGW)
        if: contains(matrix.cfg.label, 'mingw')
        shell: msys2 {0}
        run: cmake --preset ${{ matrix.cfg.preset }} -G Ninja

      - name: Build (Unix / MSVC)
        if: '!contains(matrix.cfg.label, ''mingw'')'
        run: cmake --build --preset ${{ matrix.cfg.preset }} --parallel

      - name: Build (MinGW)
        if: contains(matrix.cfg.label, 'mingw')
        shell: msys2 {0}
        run: cmake --build --preset ${{ matrix.cfg.preset }} --parallel

      - name: Test (Unix / MSVC)
        if: '!contains(matrix.cfg.label, ''mingw'')'
        run: ctest --preset ${{ matrix.cfg.preset }} --output-on-failure

      - name: Test (MinGW)
        if: contains(matrix.cfg.label, 'mingw')
        shell: msys2 {0}
        run: ctest --preset ${{ matrix.cfg.preset }} --output-on-failure

      - name: Run CLI selfcheck (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./build/${{ matrix.cfg.preset }}/cpp/cli/chemometrics4all_cli --selfcheck

      - name: Upload Release artefacts
        if: contains(matrix.cfg.label, 'release')
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: libc4a-${{ matrix.cfg.label }}
          path: |
            build/${{ matrix.cfg.preset }}/cpp/src/**/c4a*
            build/${{ matrix.cfg.preset }}/cpp/src/**/libc4a*
            build/${{ matrix.cfg.preset }}/cpp/cli/chemometrics4all_cli*
          if-no-files-found: warn
