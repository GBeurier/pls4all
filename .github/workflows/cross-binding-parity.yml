# Cross-binding parity — the "one C ABI → identical numbers across bindings" gate.
#
# Each binding builds against libn4m and runs its parity test in its own job:
#   - harness-and-python-smoke : the parity harness + Python self-consistency
#       smoke (the `cpp` baseline and `python_tier1` share the same
#       MethodSpec.pls4all_fn ctypes path, so this leg is a harness/determinism
#       check, not a cross-LANGUAGE proof — that's what the other jobs provide).
#   - js-wasm     : Emscripten WASM build + npm smoke/parity (rmse_rel ~1e-16).
#   - octave-mex  : +pls4all MEX build + test_parity (rmse_rel ~4e-16).
#   - r-binding   : standalone R CMD INSTALL (configure + prebuilt-link) +
#                   test_parity.R (rmse_rel ~9.4e-18).
# All four legs were verified locally before wiring. MATLAB stays manual (no
# licensed runner — bindings/matlab/COMPAT.md). The CRAN self-contained R build
# and the multi-platform wheels remain separate, deferred release paths
# (release-r.yml / release-wheels.yml).
name: Cross-binding parity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  harness-and-python-smoke:
    runs-on: ubuntu-22.04
    env:
      OPENBLAS_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      PYTHONHASHSEED: "0"
      N4M_R_ENV_NOWARN: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-12 g++-12 ninja-build cmake

      - name: Build libn4m (Linux gcc-12 Release)
        run: |
          cmake --preset ci-linux-gcc12-release
          cmake --build --preset ci-linux-gcc12-release --parallel

      - name: Install Python binding + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e bindings/python
          pip install pytest numpy

      - name: Unit-test the gate logic
        run: python -m pytest benchmarks/cross_binding/tests/test_ci_parity_gate.py -q

      - name: Parity harness + Python self-consistency smoke (rmse_rel <= 1e-12)
        # Python-only: a smoke check (see header). R/Octave/JS SKIP cleanly here
        # (their toolchains aren't installed) and the full cross-language gate is
        # run locally/pre-release until their CI builds land.
        run: |
          python benchmarks/cross_binding/ci_parity_gate.py \
            --lib-dir build/ci-linux-gcc12-release/cpp/src \
            --build-key ci --require python

      - name: Self-consistency gate (paper-only differentiators)
        # AOM-PLS / POP-PLS have no external reference; their correctness gate is
        # determinism + structural invariants (Phase-C-min, parity/comparator).
        run: |
          python parity/comparator/self_consistency.py \
            --method all --lib-dir build/ci-linux-gcc12-release/cpp/src

      - name: Golden snapshot regression (n4m_self)
        # The committed parity/snapshots/current/*.json must still regenerate
        # bit-identically from this build (Phase-C-min golden gate).
        run: |
          python parity/generators/run.py \
            --method all --check --lib-dir build/ci-linux-gcc12-release/cpp/src

  js-wasm:
    # JS/WASM binding: build the Emscripten module, build + stage + smoke-test the
    # npm package. The build STEPS are verified locally (npm run build clean,
    # npm test parity rmse_rel ~1e-16, npm pack ships dist/p4a.{js,wasm}); the
    # CI-specific piece is the standard setup-emsdk action (emsdk pinned to 3.1.74
    # to match .devcontainer/Dockerfile). This is the JS leg of the cross-binding
    # promise (one C ABI → identical numbers in WASM).
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ninja-build cmake

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.74

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build the WASM module (emscripten preset)
        run: |
          cmake --preset emscripten
          cmake --build --preset emscripten --target pls4all_wasm

      - name: Build + stage + smoke the JS binding
        working-directory: bindings/js
        run: |
          npm install
          npm run build          # tsc — must compile clean
          npm run stage:wasm     # copy p4a.{js,wasm} into dist/
          npm test               # WASM smoke + parity vs native (rmse_rel ~1e-16)
          npm pack --dry-run     # confirm dist/p4a.{js,wasm} ship

  octave-mex:
    # Octave binding: build libn4m, compile the +pls4all MEX shims (build_mex.m),
    # run the parity test. Verified locally (MEX compiles, test_parity PASS at
    # rmse_rel ~4e-16); CI uses apt Octave (clean mkoctfile + system gcc, none of
    # the conda-octave quirks). MATLAB stays manual (no licensed runner — COMPAT.md).
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain + Octave
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-12 g++-12 ninja-build cmake octave liboctave-dev

      - name: Build libn4m (Linux gcc-12 Release)
        run: |
          cmake --preset ci-linux-gcc12-release
          cmake --build --preset ci-linux-gcc12-release --parallel

      - name: Build the Octave MEX + run the parity test
        env:
          PLS4ALL_INCLUDE_DIR: ${{ github.workspace }}/cpp/include
          PLS4ALL_GENERATED_DIR: ${{ github.workspace }}/build/ci-linux-gcc12-release/generated
          PLS4ALL_LIB_DIR: ${{ github.workspace }}/build/ci-linux-gcc12-release/cpp/src
          LD_LIBRARY_PATH: ${{ github.workspace }}/build/ci-linux-gcc12-release/cpp/src
        run: |
          octave --no-gui --no-history --eval "cd bindings/matlab; build_mex"
          octave --no-gui --no-history --eval "addpath('${{ github.workspace }}/bindings/matlab'); cd bindings/matlab/test; test_parity"

  r-binding:
    # R binding: build libn4m, install the package standalone (configure +
    # prebuilt-link Makevars), run the parity test. Verified locally:
    # R CMD INSTALL succeeds + test_parity.R gives rmse_rel ~9.4e-18. This is the
    # dev/CI build path; the CRAN self-contained vendored build stays separate
    # (release-r.yml, manual). MATLAB stays manual (COMPAT.md).
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release

      - name: Install build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-12 g++-12 ninja-build cmake

      - name: Build libn4m (Linux gcc-12 Release)
        run: |
          cmake --preset ci-linux-gcc12-release
          cmake --build --preset ci-linux-gcc12-release --parallel

      - name: R CMD INSTALL (standalone, prebuilt-link) + parity
        env:
          PLS4ALL_LIB_DIR: ${{ github.workspace }}/build/ci-linux-gcc12-release/cpp/src
          PLS4ALL_GENERATED_DIR: ${{ github.workspace }}/build/ci-linux-gcc12-release/generated
          LD_LIBRARY_PATH: ${{ github.workspace }}/build/ci-linux-gcc12-release/cpp/src
        run: |
          R CMD INSTALL --no-multiarch --no-staged-install bindings/r/n4m
          Rscript bindings/r/test_parity.R
