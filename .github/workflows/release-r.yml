# Build, check, and (eventually) submit the n4m R package.
#
# Triggers
# --------
# - workflow_dispatch → on-demand R CMD check + tarball build.
#
# The package builds standalone via the vendored configure mode (N4M_R_VENDOR=1,
# set below): ./configure copies the full libn4m C/C++/Fortran core + the static
# n4m_export.h into src/vendor/ and compiles it into a self-contained n4m.so (no
# external libn4m). Verified locally: 221 TUs + Fortran build, test_parity.R
# rmse_rel ~9.4e-18, ldd shows no external libn4m. Kept manual (workflow_dispatch)
# because the --as-cran matrix + 221-TU compile is heavy; the fast prebuilt-link
# R build runs on every push via cross-binding-parity.yml.
#
# CRAN submission itself is the irreducible manual web-form step at
# https://cran.r-project.org/submit.html — this workflow produces + validates the
# self-contained tarball; the maintainer downloads it from the run and submits.

name: release-r

on:
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # =========================================================================
  # R CMD check --as-cran across the same matrix CRAN itself uses.
  # =========================================================================
  check:
    name: R CMD check / ${{ matrix.pkg }} / ${{ matrix.cfg.label }}
    runs-on: ${{ matrix.cfg.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        # Both R packages: the full n4m surface and the slim pls4all subset.
        # Each is self-contained (vendors + compiles its own libn4m).
        pkg:
          - n4m
          - pls4all
        cfg:
          - label: linux-release
            runs_on: ubuntu-22.04
            r_version: "release"
          - label: linux-devel
            runs_on: ubuntu-22.04
            r_version: "devel"
          - label: macos-arm64-release
            runs_on: macos-14
            r_version: "release"
          - label: windows-release
            runs_on: windows-2022
            r_version: "release"
    env:
      R_KEEP_PKG_SOURCE: yes
      # NB: N4M_R_VENDOR is intentionally NOT a job-wide env. It must be set ONLY
      # for the pre-vendor step below (which runs in the checkout, where cpp/src
      # exists). Setting it job-wide would make ./configure re-vendor during the
      # tarball INSTALL too — but the unpacked tarball has no cpp/src, so it would
      # fail. The bundled src/vendor/ is used at check time instead (the real
      # CRAN scenario).
      #
      # Some R CMD check stages need DESCRIPTION's URL fields to be reachable;
      # this CI builds offline-only, so disable that incoming-feasibility check.
      _R_CHECK_CRAN_INCOMING_REMOTE_: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.cfg.r_version }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: bindings/r/${{ matrix.pkg }}
          extra-packages: |
            any::rcmdcheck
            any::knitr
            any::rmarkdown
            any::testthat

      # Populate src/vendor/ from the in-repo cpp/src (gitignored, empty at
      # checkout). N4M_R_VENDOR=1 is scoped to THIS step, where cpp/src is
      # reachable; the build then bundles src/vendor/ into the tarball and the
      # check installs from that bundled copy (no re-vendor at install time).
      # shell: bash so it runs on the Windows runner too (Rtools provides bash;
      # the package ships src/Makevars.win for the actual Windows compile).
      - name: Vendor libn4m sources into the R package
        shell: bash
        run: cd bindings/r/${{ matrix.pkg }} && N4M_R_VENDOR=1 ./configure

      - name: R CMD check --as-cran
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: bindings/r/${{ matrix.pkg }}
          # r-lib/actions/check-r-package interpolates these values into
          # rcmdcheck::rcmdcheck(args = ..., error_on = ...) as literal R
          # code, so they must be valid R syntax.
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"warning"'
          upload-snapshots: true

      - name: Upload check artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rcheck-${{ matrix.pkg }}-${{ matrix.cfg.label }}
          path: bindings/r/${{ matrix.pkg }}.Rcheck/

  # =========================================================================
  # Build the source tarball that the maintainer uploads to CRAN.
  # =========================================================================
  build-tarball:
    name: Build CRAN source tarball (${{ matrix.pkg }})
    needs: check
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        pkg:
          - n4m
          - pls4all
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: bindings/r/${{ matrix.pkg }}
          extra-packages: any::knitr any::rmarkdown

      - name: Vendor the libn4m core into src/vendor (self-contained tarball)
        working-directory: bindings/r/${{ matrix.pkg }}
        env:
          N4M_R_VENDOR: "1"
        # ./configure copies the full C/C++/Fortran core + the static export
        # header from the checkout into src/vendor/, so the source tarball is
        # self-contained (no external libn4m; CRAN's farm compiles from source).
        run: ./configure

      - name: R CMD build (produces n4m_${VER}.tar.gz)
        working-directory: bindings/r/${{ matrix.pkg }}
        run: R CMD build .

      - name: Stage tarball
        working-directory: bindings/r/${{ matrix.pkg }}
        run: |
          set -euo pipefail
          mkdir -p ../../../dist-r
          mv ${{ matrix.pkg }}_*.tar.gz ../../../dist-r/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pkg }}-cran-tarball
          path: dist-r/${{ matrix.pkg }}_*.tar.gz
          if-no-files-found: error
          retention-days: 90

  # =========================================================================
  # Attach the tarball to the GitHub Release on tag pushes (vX.Y.Z).
  # The maintainer then downloads from the Release and submits via the
  # CRAN web form at https://cran.r-project.org/submit.html.
  # =========================================================================
  publish-release-asset:
    name: Attach tarball to GitHub Release
    needs: build-tarball
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*-cran-tarball'
          merge-multiple: true
          path: dist-r/

      - name: Upload to the matching Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-r/*.tar.gz
          fail_on_unmatched_files: true
