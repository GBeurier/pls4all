name: release-r

on:
  push:
    branches: [main, "release/m2-cran"]
    tags: ["v*.*.*"]
    paths:
      - "bindings/r/**"
      - "cpp/**"
      - "cmake/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - ".github/workflows/release-r.yml"
  pull_request:
    paths:
      - "bindings/r/**"
      - "cpp/**"
      - "cmake/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - ".github/workflows/release-r.yml"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: R CMD check / ${{ matrix.cfg.label }}
    runs-on: ${{ matrix.cfg.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        cfg:
          - label: linux-release
            runs_on: ubuntu-22.04
            r_version: "release"
          - label: linux-devel
            runs_on: ubuntu-22.04
            r_version: "devel"
          - label: macos-arm64-release
            runs_on: macos-14
            r_version: "release"
          - label: windows-release
            runs_on: windows-2022
            r_version: "release"
    env:
      R_KEEP_PKG_SOURCE: yes
      _R_CHECK_CRAN_INCOMING_REMOTE_: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.cfg.r_version }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: bindings/r/n4m
          extra-packages: |
            any::rcmdcheck
            any::jsonlite
            any::testthat

      - name: R CMD check --as-cran
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: bindings/r/n4m
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"warning"'
          upload-snapshots: true

      - name: Upload check artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rcheck-${{ matrix.cfg.label }}
          path: bindings/r/n4m.Rcheck/

  build-tarball:
    name: Build CRAN source tarball
    needs: check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Build source tarball
        working-directory: bindings/r/n4m
        run: R CMD build .

      - name: Stage tarball
        working-directory: bindings/r/n4m
        run: |
          mkdir -p ../../../dist-r
          mv n4m_*.tar.gz ../../../dist-r/

      - uses: actions/upload-artifact@v4
        with:
          name: nirs4all-methods-cran-tarball
          path: dist-r/n4m_*.tar.gz
          if-no-files-found: error
          retention-days: 90

  publish-release-asset:
    name: Attach tarball to GitHub Release
    needs: build-tarball
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nirs4all-methods-cran-tarball
          path: dist-r/

      - name: Upload to the matching Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-r/n4m_*.tar.gz
          fail_on_unmatched_files: true
