[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pls4all-parity-generator"
version = "0.1.0"
description = "Generate pls4all parity fixtures from pinned reference PLS implementations (scikit-learn, nirs4all)."
authors = [{ name = "Grégory Beurier and contributors" }]
license = "CECILL-2.1"
requires-python = ">=3.10"
dependencies = [
  "numpy==1.26.4",
  "scikit-learn==1.4.2",
  "scipy==1.11.4",
  "joblib==1.4.0"
]
# nirs4all 0.8.x is treated as optional at Phase 0 (the adapter skip()s if it
# is not importable). Pin it via requirements-lock.txt for full coverage.

[project.scripts]
generate-fixtures = "pls4all_parity.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
